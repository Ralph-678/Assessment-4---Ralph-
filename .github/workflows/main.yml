name: CI Pipeline

on:
  push:
    branches:
      - '**'

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: local_api_js

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run app
        run: node api.js &

      - name: Wait for server
        run: sleep 3

      - name: Test API
        run: curl -f http://localhost:3000/api

      - name: Test newAPI
        run: curl -f http://localhost:3000/newapi

      - name: Stop server
        run: pkill node
